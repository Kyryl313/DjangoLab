{% extends "main/base.html" %}

{% block content %}

<h1 class="menu-title">
    {{ title }}
</h1>

<div class="dish-container">

    {% for dish in dishes %}
        <div class="dish-card">
            <h2>{{ dish.name }}</h2>

            <p class="price">
                {{ dish.price }} грн
            </p>

            <button>
                Замовити
            </button>
        </div>
    {% endfor %}

</div>

{% endblock %}
